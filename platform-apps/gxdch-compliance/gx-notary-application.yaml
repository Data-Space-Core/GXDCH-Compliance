apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gx-notary
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: gxdch-compliance
  source:
    repoURL: https://github.com/Data-Space-Core/GXDCH-Compliance.git
    targetRevision: main
    path: charts/gx-notary
    helm:
      releaseName: main-notary
      valueFiles:
        - ../../platform-apps/gxdch-compliance/values/gx-notary-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gxdch-compliance
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
