apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gxdch-compliance
  namespace: argocd
spec:
  description: Gaia-X GXDCH compliance stack
  sourceRepos:
    - https://github.com/REPLACE_ME/GXDCH-Compliance.git
    - https://gitlab.com/gaia-x/lab/compliance/gx-registry.git
    - https://gitlab.com/gaia-x/lab/compliance/gx-compliance.git
    - https://gitlab.com/gaia-x/lab/compliance/gaia-x-notary-registrationnumber.git
  destinations:
    - namespace: gxdch-compliance
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
