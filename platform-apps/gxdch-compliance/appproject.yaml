apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gxdch-compliance
  namespace: argocd
spec:
  description: Gaia-X GXDCH compliance stack
  sourceRepos:
    - https://github.com/Data-Space-Core/GXDCH-Compliance.git
  destinations:
    - namespace: gxdch-compliance
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
