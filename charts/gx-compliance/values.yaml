# Default values for gx-compliance.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/gaia-x/lab/compliance/gx-compliance
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: "main"
fullnameOverride: ""


podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: "compliance.lab.gaia-x.eu"
      paths:
        - path: /main
          pathType: Prefix
  tls:
    - hosts:
        - "compliance.lab.gaia-x.eu"
      secretName: compliance-server-tls-secret

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false

nodeSelector: {}

tolerations: []

affinity: {}

urls:
  registry:
existingSecret: ""
existingSecretKeyName: key
existingSecretX509Name: x509
PRIVATE_KEY: ZW1wdHk=
PRIVATE_KEY_ALGORITHM: PS256
X509_CERTIFICATE: ZW1wdHk=
production: true
memgraphEnabled: true
DISABLE_SIGNATURE_CHECK: false
persistence:
  libStorageSize: 2Gi
  logStorageSize: 1Gi
USE_OFFLINE_DOCUMENT_LOADER: true
ntpServers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org
  - 3.pool.ntp.org
allowedContextVersions:
  - development
  - main
  - v1
  - v2
  - '2406'
  - '2411'
  - '2503'
  - '2511'
ADDITIONAL_DESCRIPTION: 
