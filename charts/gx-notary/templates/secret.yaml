{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gx-notary.fullname" . }}-secrets
  labels:
    {{- include "gx-notary.labels" . | nindent 4 }}
type: Opaque
data:
  PRIVATE_KEY: {{ .Values.PRIVATE_KEY }}
  X509_CERTIFICATE: {{ .Values.X509_CERTIFICATE }}
  openCorporatesAPIKey: {{ .Values.openCorporatesAPIKey }}
{{- end }}
